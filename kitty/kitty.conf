# vim:fileencoding=utf-8:foldmethod=marker

# =============================================================================
# FONTS
# =============================================================================
font_family JetBrainsMono Nerd Font
font_size 12
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono
disable_ligatures cursor

# Cursor
cursor_trail 3
cursor none

# Misc
scrollback_lines 10000
touch_scroll_multiplier 6.0
copy_on_select yes
background_opacity 0.80
dynamic_background_opacity yes
enable_audio_bell no
remember_window_size no
initial_window_width 1600
initial_window_height 1000
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
enabled_layouts Splits,Stack
hide_window_decorations yes
tab_bar_style powerline
tab_separator " "
dynamic_background_opacity yes
# scrollback_pager $SHELL -c 'nvim -c "Baleia"'
scrollback_pager ~/.local/share/bob/nvim-bin/nvim -c "lua require('util').colorize()"

tab_title_template "{title}{fmt.bold}{'  ' if num_windows > 1 and layout_name == 'stack' else ''}"

# =============================================================================
# KEY MAPPINGS
# =============================================================================

# Windows
map alt+enter new_window_with_cwd
map alt+r     start_resizing_window
map alt+h     neighboring_window left
map alt+l     neighboring_window right
map alt+k     neighboring_window up
map alt+j     neighboring_window down

# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+, move_tab_backward
map ctrl+shift+. move_tab_forward

# Layouts
map ctrl+shift+z toggle_layout stack
